                    },
                    keyframes: {
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' }

            .fade-up { opacity:0; transform:translateY(40px); transition:.8s ease; }
            .fade-up.show { opacity:1; transform:translateY(0); }

    <style>

        body { background:#0A0A0A; color:#fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

<body>

<script>
const GITHUB_CONFIG = {
    username: "yuguo-yg-bit",
    repo: "yuguo-official",
    token: "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd"
};

// 生成随机人类验证验证码
let captchaCode = Math.floor(1000 + Math.random() * 9000).toString();

// 密码哈希函数（SHA256）
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// 注册提交
async function handleRegister() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirmPwd = document.getElementById('confirmPwd').value;
    const captcha = document.getElementById('captcha').value.trim();

    // 基础验证
    if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('手机号格式不正确！');
        return;
    }
    if (password !== confirmPwd) {
        alert('两次密码输入不一致！');
        return;
    }
    if (captcha !== captchaCode) {
        alert('人类验证失败！请重新输入验证码');
        captchaCode = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('captchaText').innerText = captchaCode;
        return;
    }

    // 密码哈希
    const pwdHash = await hashPassword(password);

    // 构造GitHub Issue数据
    const issueData = {
        title: `用户注册 | ${phone}`,
        body: `### 用户信息
- 手机号：${phone}
- 密码哈希值：${pwdHash}
- 注册时间：${new Date().toLocaleString('zh-CN')}`,
        labels: ["user-register"]
    };

    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues`, {
            method: "POST",
            headers: {
                "Authorization": `token ${GITHUB_CONFIG.token}`,
                "Content-Type": "application/json",
                "Accept": "application/vnd.github.v3+json"
            },
            body: JSON.stringify(issueData)
        });

        if (response.ok) {
            alert('注册成功！请前往登录页登录');
            window.location.href = 'login.html';
        } else {
            const err = await response.json();
            alert('注册失败：' + err.message);
        }
    } catch (e) {
        alert('网络异常：' + e.message);
    }
}
</script>

<!-- 注册表单区（严格按你手绘稿：手机号+密码+人类验证） -->
<section class="min-h-screen flex items-center justify-center px-6 pt-20">
    <div class="max-w-md w-full bg-card rounded-2xl border border-border p-8 fade-up">
        <h2 class="text-2xl font-bold text-gold text-center mb-6">用户注册</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">手机号</label>
                <input type="tel" id="phone" placeholder="请输入11位手机号" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-gold outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">新建密码</label>
                <input type="password" id="password" placeholder="请输入密码" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-gold outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">确认密码</label>
                <input type="password" id="confirmPwd" placeholder="请再次输入密码" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-gold outline-none">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">人类验证</label>
                <div class="flex items-center gap-2 mb-2">
                    <span id="captchaText" class="text-gold font-bold text-lg select-none">{captchaCode}</span>
                    <button type="button" onclick="captchaCode = Math.floor(1000 + Math.random() * 9000).toString(); document.getElementById('captchaText').innerText = captchaCode;" class="text-sm text-gray-400 hover:text-gold">刷新</button>
                </div>
                <input type="text" id="captcha" placeholder="请输入上图验证码" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-gold outline-none">
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button onclick="window.location.href='index.html'" class="flex-1 border border-gray-600 text-gray-400 py-3 rounded-lg hover:border-gold hover:text-gold transition-colors">返回</button>
            <button onclick="handleRegister()" class="flex-2 bg-gold text-black py-3 rounded-lg font-medium glow">OK（注册）</button>
        </div>

        <div class="mt-4 text-center text-sm text-gray-400">
            已有账号？<a href="login.html" class="text-gold hover:underline">去登录</a>
        </div>
    </div>
</section>

<script>
window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) navbar.classList.add('glass');
  else navbar.classList.remove('glass');
});
window.addEventListener('load', () => {
  document.querySelector('.fade-up').classList.add('show');
  document.getElementById('captchaText').innerText = captchaCode;
});
</script>
