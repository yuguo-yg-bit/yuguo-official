<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款记录 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050505',
                        gold: '#FFD700',
                        glass: 'rgba(20, 20, 20, 0.85)',
                        card: '#121212',
                        border: '#222222',
                        success: '#10B981',
                        warning: '#F59E0B',
                        pending: '#3B82F6'
                    },
                    fontFamily: {
                        tech: ['Inter','system-ui','sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 12px rgba(255,215,0,0.3); }
            .fade-up { opacity:0; transform:translateY(40px); transition:.6s ease; }
            .fade-up.show { opacity:1; transform:translateY(0); }
            .badge-success { background:rgba(16,185,129,0.2); color:#10B981; }
            .badge-pending { background:rgba(59,130,246,0.2); color:#3B82F6; }
            .badge-warning { background:rgba(245,158,11,0.2); color:#F59E0B; }
        }
    </style>
    <style>
        * { scroll-behavior:smooth }
        body { background:#0A0A0A; color:#fff }
        .glass { backdrop-filter:blur(12px) }
        .record-item { transition:.25s ease }
        .record-item:hover { transform:translateX(4px); border-color:#FFD700 }
    </style>
</head>

<body>

<script>
const GITHUB_CONFIG = {
  username: "yuguo-yg-bit",
  repo: "yuguo-official",
  token: "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"
};
</script>

<nav id="navbar" class="fixed w-full z-50 py-4 px-6 transition-all">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <a class="flex items-center gap-2 text-xl font-bold text-gold">
      <i class="fa-solid fa-atom"></i>玉国科技
    </a>
    <div class="hidden md:flex gap-6 text-sm">
      <a href="index.html">首页</a>
      <a href="index.html#product">商品区</a>
      <a href="index.html#movie">电影区</a>
      <a href="index.html#feifei">兔兔小飞飞</a>
    </div>
    <div class="flex items-center gap-4">
      <a class="text-gold">付款记录</a>
      <button class="bg-gold text-black px-4 py-2 rounded-full text-sm">登录</button>
    </div>
  </div>
</nav>

<section class="pt-36 pb-10 px-6 fade-up">
  <div class="max-w-6xl mx-auto">
    <a href="index.html#product" class="inline-flex items-center gap-2 text-gold mb-4">
      <i class="fa-solid fa-arrow-left"></i> 返回购物
    </a>
    <h1 class="text-3xl font-bold text-gold mb-2">付款记录</h1>
    <p class="text-gray-400">数据全部来自 GitHub Issues，无任何本地假数据</p>
  </div>
</section>

<section class="px-6 pb-4 fade-up">
  <div class="max-w-6xl mx-auto flex flex-wrap gap-3">
    <button class="filter-btn bg-gold text-black px-4 py-2 rounded-lg text-sm" data-status="all">全部</button>
    <button class="bg-card text-white px-4 py-2 rounded-lg text-sm" data-status="待发货">待发货</button>
    <button class="bg-card text-white px-4 py-2 rounded-lg text-sm" data-status="已完成">已完成</button>
  </div>
</section>

<section class="py-8 px-6 fade-up">
  <div class="max-w-6xl mx-auto">
    <div id="recordList" class="space-y-4">
      <!-- 初始只显示加载中，无任何记录 -->
      <div class="bg-card rounded-xl p-10 text-center">
        <i class="fa-solid fa-spinner fa-spin text-gold text-2xl mb-4"></i>
        <p>正在从 GitHub Issues 加载真实记录...</p>
      </div>
    </div>

    <div id="emptyState" class="hidden bg-card rounded-xl border border-border p-12 text-center">
      <i class="fa-solid fa-inbox text-gold/40 text-5xl mb-4"></i>
      <h3 class="text-xl font-bold mb-2">暂无付款记录</h3>
      <p class="text-gray-400 mb-6">只有支付成功后才会在这里显示</p>
      <a href="danzai.html" class="bg-gold text-black px-6 py-2 rounded-lg font-medium">去购买</a>
    </div>
  </div>
</section>

<footer class="py-10 text-center text-sm text-gray-500 border-t border-border mt-10">
  <p>© 2025 玉国科技</p>
  <p class="mt-1">所有订单真实存储于 GitHub Issues</p>
</footer>

<button id="backToTop" class="fixed bottom-6 right-6 w-12 h-12 bg-gold text-black rounded-full flex items-center justify-center opacity-0 invisible transition-all">
  <i class="fa-solid fa-arrow-up"></i>
</button>

<script>
let allRecords = [];

window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) navbar.classList.add('glass');
  else navbar.classList.remove('glass');

  const btn = document.getElementById('backToTop');
  if (window.scrollY > 300) btn.classList.remove('opacity-0','invisible');
  else btn.classList.add('opacity-0','invisible');

  document.querySelectorAll('.fade-up').forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight * 0.9) el.classList.add('show');
  });
});

document.getElementById('backToTop').onclick = () => window.scrollTo({ top:0 });

async function loadRecords() {
  const list = document.getElementById('recordList');
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues?labels=payment-record`,
      { headers: { Authorization: `token ${GITHUB_CONFIG.token}` }}
    );
    const issues = await res.json();
    allRecords = issues;
    render(issues);
    if (issues.length === 0) {
      list.classList.add('hidden');
      document.getElementById('emptyState').classList.remove('hidden');
    }
  } catch (e) {
    list.innerHTML = `<div class="bg-card p-8 rounded-xl text-center text-red-400">加载失败</div>`;
  }
}

function render(list) {
  const container = document.getElementById('recordList');
  container.innerHTML = '';
  list.forEach(issue => {
    const b = issue.body || '';
    const o = (b.match(/订单号：(\S+)/)||[])[1] || '';
    const n = (b.match(/商品名称：(.+)/)||[])[1] || '';
    const a = (b.match(/支付金额：(\S+)/)||[])[1] || '';
    const t = (b.match(/支付时间：(.+)/)||[])[1] || '';
    const s = (b.match(/订单状态：(.+)/)||[])[1] || '';

    let cls = 'badge-pending';
    if (s === '已完成') cls = 'badge-success';
    if (s === '待上映') cls = 'badge-warning';

    container.innerHTML += `
<div class="record-item bg-card border border-border rounded-xl p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-lg bg-gold/10 flex items-center justify-center">
      <i class="fa-solid fa-box text-gold"></i>
    </div>
    <div>
      <div class="font-bold">${n}</div>
      <div class="text-sm text-gray-400">${o}</div>
    </div>
  </div>
  <div class="font-bold text-gold">${a}</div>
  <div class="flex items-center gap-3">
    <span class="${cls} px-2 py-1 rounded-full text-xs">${s}</span>
    <a href="${issue.html_url}" target="_blank" class="text-gold text-sm">查看</a>
  </div>
</div>`;
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('bg-gold','text-black');
      b.classList.add('bg-card','text-white');
    });
    this.classList.add('bg-gold','text-black');
    const v = this.dataset.status;
    if (v === 'all') render(allRecords);
    else render(allRecords.filter(i => (i.body||'').includes(`订单状态：${v}`)));
  });
});

window.onload = loadRecords;
</script>

</body>
</html>
