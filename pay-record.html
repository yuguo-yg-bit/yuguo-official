<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购买记录 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050505',
                        gold: '#FFD700',
                        glass: 'rgba(20,20,20,0.85)',
                        card: '#121212',
                        border: '#222222',
                        success: '#10B981',
                        warning: '#F59E0B',
                        pending: '#3B82F6'
                    },
                    fontFamily: {
                        tech: ['Inter','system-ui','sans-serif']
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'breath': 'breath 4s ease-in-out infinite',
                    },
                    keyframes: {
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
            .fade-up { opacity:0; transform:translateY(40px); transition:.8s ease; }
            .fade-up.show { opacity:1; transform:translateY(0); }
            .badge-success { background:rgba(16,185,129,0.2); color:#10B981; }
            .badge-pending { background:rgba(59,130,246,0.2); color:#3B82F6; }
            .badge-warning { background:rgba(245,158,11,0.2); color:#F59E0B; }
            .record-item { transition:.25s ease; }
            .record-item:hover { transform:translateX(4px); border-color:#FFD700; }
        }
    </style>
    <style>
        * { scroll-behavior: smooth; margin: 0; padding: 0; box-sizing: border-box; }
        body { background:#0A0A0A; color:#fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
    </style>
</head>
<body>

<script>
const GITHUB_CONFIG = {
    username: "yuguo-yg-bit",
    repo: "yuguo-official",
    token: "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd"
};

const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
if (!currentUser) {
    alert('你未登录！请登录！');
    window.location.href = 'login.html';
}

function checkLoginNav() {
    const userArea = document.getElementById('userArea');
    userArea.innerHTML = `
        <span class="text-gold mr-3">${currentUser.phone}</span>
        <a href="index.html" class="text-sm hover:text-gold transition-colors">首页</a>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">退出</button>
    `;
}

function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}
</script>

<nav id="navbar" class="fixed w-full z-50 py-4 px-6 transition-all duration-500">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gold text-shadow">
      <i class="fa-solid fa-atom text-gold text-2xl animate-pulse-slow"></i>玉国科技
    </a>
    <div class="hidden md:flex gap-6 text-sm font-medium">
      <a href="index.html" class="hover:text-gold transition-colors">首页</a>
      <a href="index.html#product" class="hover:text-gold transition-colors">商品区</a>
      <a href="index.html#movie" class="hover:text-gold transition-colors">电影区</a>
      <a href="index.html#feifei" class="hover:text-gold transition-colors">兔兔小飞飞</a>
      <a href="index.html#tools" class="hover:text-gold transition-colors">实用工具</a>
      <a href="index.html#games" class="hover:text-gold transition-colors">小游戏</a>
      <a href="pay-record.html" class="hover:text-gold transition-colors">购买记录</a>
    </div>
    <div id="userArea" class="flex items-center gap-4"></div>
  </div>
</nav>

<section class="pt-36 pb-10 px-6 fade-up">
    <div class="max-w-6xl mx-auto">
        <a href="danzai.html" class="inline-flex items-center gap-2 text-gold mb-6 hover:underline">
            <i class="fa-solid fa-arrow-left"></i> 继续购物
        </a>
        <h1 class="text-3xl md:text-4xl font-bold text-gold mb-2">购买记录</h1>
        <p class="text-gray-400">查看你的订单与物流信息</p>
    </div>
</section>

<section class="py-4 px-6 fade-up">
    <div class="max-w-6xl mx-auto flex flex-wrap gap-3">
        <button class="filter-btn bg-gold text-black px-4 py-2 rounded-lg text-sm font-medium glow" data-status="all">全部记录</button>
        <button class="bg-card text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-card/80 transition-colors" data-status="待发货">待发货</button>
        <button class="bg-card text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-card/80 transition-colors" data-status="已完成">已完成</button>
    </div>
</section>

<section class="py-8 px-6 fade-up">
    <div class="max-w-6xl mx-auto">
        <div id="recordList" class="space-y-4">
            <div class="bg-card rounded-xl p-10 text-center">
                <i class="fa-solid fa-spinner fa-spin text-gold text-2xl mb-4"></i>
                <p>正在加载你的订单记录...</p>
            </div>
        </div>
        <div id="emptyState" class="hidden bg-card rounded-xl border border-border p-12 text-center">
            <i class="fa-solid fa-inbox text-gold/40 text-5xl mb-4"></i>
            <h3 class="text-xl font-bold mb-2">暂无购买记录</h3>
            <p class="text-gray-400 mb-6">只有支付成功后才会在这里显示</p>
            <a href="danzai.html" class="bg-gold text-black px-6 py-2 rounded-lg font-medium glow">去购买商品</a>
        </div>
    </div>
</section>

<section class="py-12 px-6 fade-up">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold text-gold mb-6">订单状态说明</h2>
        <div class="bg-card rounded-xl border border-border p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex items-start gap-3">
                    <span class="badge-pending px-2 py-1 rounded-full text-xs">待发货</span>
                    <p class="text-sm text-gray-300">付款成功，商品准备中，1-3个工作日内发货</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="badge-success px-2 py-1 rounded-full text-xs">已完成</span>
                    <p class="text-sm text-gray-300">商品已签收，订单完成</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="badge-warning px-2 py-1 rounded-full text-xs">待上映</span>
                    <p class="text-sm text-gray-300">电影预售，上映后自动更新</p>
                </div>
            </div>
            <p class="text-xs text-gray-500 mt-6">点击订单右侧【查看物流】可查看实时运输进度</p>
        </div>
    </div>
</section>

<footer class="py-10 text-center text-sm text-gray-500 border-t border-border bg-darker">
  <div class="max-w-6xl mx-auto">
    <div class="flex items-center justify-center gap-2 mb-4">
      <i class="fa-solid fa-atom text-gold text-xl"></i>
      <span class="text-gold font-bold">玉国科技</span>
    </div>
    <p class="mb-2">© 2025 玉国科技 版权所有</p>
  </div>
</footer>

<button id="backToTop" class="fixed bottom-6 right-6 w-12 h-12 bg-gold text-black rounded-full flex items-center justify-center opacity-0 invisible transition-all duration-300 glow">
  <i class="fa-solid fa-arrow-up"></i>
</button>

<script>
let allRecords = [];

window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) {
    navbar.classList.add('glass');
    navbar.classList.add('py-3');
    navbar.classList.remove('py-4');
  } else {
    navbar.classList.remove('glass');
    navbar.classList.add('py-4');
    navbar.classList.remove('py-3');
  }

  const backToTop = document.getElementById('backToTop');
  if (window.scrollY > 300) {
    backToTop.classList.remove('opacity-0','invisible');
    backToTop.classList.add('opacity-100','visible');
  } else {
    backToTop.classList.add('opacity-0','invisible');
    backToTop.classList.remove('opacity-100','visible');
  }

  document.querySelectorAll('.fade-up').forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight * 0.9) {
      el.classList.add('show');
    }
  });
});

async function loadPaymentRecords() {
  const list = document.getElementById('recordList');
  const empty = document.getElementById('emptyState');
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues?labels=payment-record&state=all`, {
      headers: {
        "Authorization": `token ${GITHUB_CONFIG.token}`,
        "Accept": "application/vnd.github.v3+json"
      }
    });
    if (res.ok) {
      const issues = await res.json();
      const myOrders = issues.filter(issue => {
          const body = issue.body || "";
          return body.includes(currentUser.phone);
      });
      allRecords = myOrders;
      renderRecords(myOrders);
      if (myOrders.length === 0) {
          list.classList.add('hidden');
          empty.classList.remove('hidden');
      } else {
          list.classList.remove('hidden');
          empty.classList.add('hidden');
      }
    }
  } catch (e) {
    list.innerHTML = `<div class="bg-card p-8 text-center text-red-400">加载失败：${e.message}</div>`;
  }
}

function renderRecords(records) {
  const list = document.getElementById('recordList');
  let html = "";
  records.forEach(issue => {
    const body = issue.body || "";
    const orderNo = body.match(/订单号：(\S+)/)?.[1] || "未知";
    const product = body.match(/商品名称：(.+)/)?.[1] || "未知商品";
    const amount = body.match(/支付金额：(\S+)/)?.[1] || "¥0.00";
    const time = body.match(/支付时间：(.+)/)?.[1] || "未知";
    const status = body.match(/订单状态：(.+)/)?.[1] || "未知";

    let cls = "badge-pending";
    if (status === "已完成") cls = "badge-success";
    if (status === "待上映") cls = "badge-warning";

    html += `
<div class="record-item bg-card rounded-xl border border-border p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
  <div class="flex items-center gap-4">
    <div class="w-12 h-12 rounded-lg bg-gold/10 flex items-center justify-center">
      <i class="fa-solid fa-box text-gold"></i>
    </div>
    <div>
      <h3 class="font-bold">${product}</h3>
      <p class="text-sm text-gray-400">订单：${orderNo} | ${time}</p>
    </div>
  </div>
  <div class="flex flex-col items-end md:items-end gap-2">
    <p class="text-gold font-bold">${amount}</p>
    <span class="text-xs px-2 py-1 rounded-full ${cls}">${status}</span>
    <a href="logistics.html?orderNo=${orderNo}" class="text-xs text-gold hover:underline mt-1">
      <i class="fa-solid fa-truck-fast mr-1"></i> 查看物流
    </a>
  </div>
</div>
    `;
  });
  list.innerHTML = html;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('bg-gold','text-black');
      b.classList.add('bg-card','text-white');
    });
    this.classList.add('bg-gold','text-black');
    const s = this.dataset.status;
    if (s === 'all') renderRecords(allRecords);
    else {
      const f = allRecords.filter(r => {
          const st = r.body?.match(/订单状态：(.+)/)?.[1];
          return st === s;
      });
      renderRecords(f);
    }
  });
});

window.addEventListener('load', () => {
  checkLoginNav();
  loadPaymentRecords();
  document.querySelectorAll('.fade-up').forEach(el => el.classList.add('show'));
});

document.getElementById('backToTop').onclick = () => window.scrollTo({ top:0, behavior:'smooth' });
</script>

</body>
</html>
