<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050505',
                        gold: '#FFD700',
                        card: '#121212',
                        border: '#222222',
                    },
                    animation: {
                        'breath': 'breath 4s ease-in-out infinite',
                    },
                    keyframes: {
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
            .card-hover { transition: all .3s ease; }
            .card-hover:hover { transform: translateY(-4px); border-color: #FFD700; }
        }
    </style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0A; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- 导航栏（和前两个游戏完全一致） -->
    <nav class="fixed top-0 left-0 w-full py-4 px-6 bg-dark/90 backdrop-blur-md border-b border-border z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gold text-shadow">
                <i class="fa-solid fa-atom text-gold text-2xl"></i>玉国科技
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-sm text-gray-400 hover:text-gold transition-colors">返回首页</a>
                <a href="guess.html" class="text-sm text-gray-400 hover:text-gold transition-colors">猜数字</a>
                <a href="snake.html" class="text-sm text-gray-400 hover:text-gold transition-colors">贪吃蛇</a>
            </div>
        </div>
    </nav>

    <!-- 打地鼠游戏主区域 -->
    <main class="pt-32 pb-20 px-6 min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md bg-card rounded-2xl border border-border p-8 card-hover">
            <div class="w-16 h-16 rounded-full bg-gold/10 flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-hammer text-gold text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-center mb-3">趣味打地鼠</h1>
            <p class="text-gray-400 text-sm text-center mb-8">点击出现的金色地鼠，反应越快得分越高</p>
            
            <div class="space-y-6">
                <!-- 地鼠网格 -->
                <div id="moleGrid" class="grid grid-cols-3 gap-3">
                    <div onclick="hitMole(0)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(1)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(2)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(3)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(4)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(5)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(6)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(7)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                    <div onclick="hitMole(8)" class="h-16 bg-dark rounded-xl border border-gray-700 flex items-center justify-center cursor-pointer hover:bg-gold/5 transition-colors"></div>
                </div>
                
                <!-- 得分显示 -->
                <div class="bg-dark/60 rounded-xl p-3 flex justify-between items-center">
                    <span class="text-sm text-gray-300">当前积分</span>
                    <span id="scoreDisplay" class="text-gold font-bold text-lg">0</span>
                </div>
                
                <!-- 重新开始按钮 -->
                <button 
                    onclick="restartGame()"
                    class="w-full bg-gold text-black py-3 rounded-xl font-medium glow hover:bg-gold/90 transition-colors transform hover:scale-[1.02] active:scale-[0.98]"
                >
                    重新开始游戏
                </button>
                
                <div class="text-xs text-gray-500 text-center">
                    提示：地鼠随机出现，点击越快得分越高，无时间限制
                </div>
            </div>
        </div>
    </main>

    <!-- 底部信息 -->
    <footer class="py-6 text-center text-sm text-gray-500 border-t border-border bg-darker">
        <p>© 2025 玉国科技 | 黑金风格小游戏</p>
    </footer>

    <script>
        let score = 0;
        let currentMole = -1;
        let moleTimer;
        const moleTiles = document.querySelectorAll('#moleGrid > div');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // 开始游戏
        function startGame() {
            score = 0;
            currentMole = -1;
            scoreDisplay.textContent = score;
            clearInterval(moleTimer);
            moleTimer = setInterval(showMole, 1200);
        }

        // 显示地鼠
        function showMole() {
            // 隐藏上一个地鼠
            if (currentMole !== -1) {
                moleTiles[currentMole].innerHTML = '';
            }
            // 随机生成新地鼠位置
            currentMole = Math.floor(Math.random() * 9);
            moleTiles[currentMole].innerHTML = '<i class="fa-solid fa-circle text-gold text-2xl"></i>';
            // 定时隐藏地鼠
            setTimeout(() => {
                if (currentMole !== -1) {
                    moleTiles[currentMole].innerHTML = '';
                    currentMole = -1;
                }
            }, 900);
        }

        // 击中地鼠
        function hitMole(index) {
            if (index === currentMole) {
                score += 10;
                scoreDisplay.textContent = score;
                moleTiles[index].innerHTML = '';
                currentMole = -1;
            }
        }

        // 重新开始游戏
        function restartGame() {
            clearInterval(moleTimer);
            moleTiles.forEach(tile => tile.innerHTML = '');
            startGame();
        }

        // 启动游戏
        startGame();
    </script>
</body>
</html>
