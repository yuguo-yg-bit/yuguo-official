<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人小视频 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050505',
                        gold: '#FFD700',
                        glass: 'rgba(20,20,20,0.85)',
                        card: '#121212',
                        border: '#222222',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'breath': 'breath 4s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' }
                        },
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
            .fade-up { opacity:0; transform:translateY(40px); transition:.8s ease; }
            .fade-up.show { opacity:1; transform:translateY(0); }
            .card-hover { transition: all .3s ease; }
            .card-hover:hover { transform: translateY(-4px); border-color: #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        }
    </style>
    <style>
        * { scroll-behavior: smooth; margin: 0; padding: 0; box-sizing: border-box; }
        body { background:#0A0A0A; color:#fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav id="navbar" class="fixed w-full z-50 py-4 px-6 transition-all duration-500">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gold text-shadow">
      <i class="fa-solid fa-atom text-gold text-2xl animate-pulse-slow"></i>玉国科技
    </a>
    <div class="hidden md:flex gap-6 text-sm font-medium">
      <a href="index.html" class="hover:text-gold transition-colors">首页</a>
      <a href="index.html#product" class="hover:text-gold transition-colors">商品区</a>
      <a href="index.html#movie" class="hover:text-gold transition-colors">电影区</a>
      <a href="feifei.html" class="hover:text-gold transition-colors">兔兔小飞飞</a>
      <a href="index.html#tools" class="hover:text-gold transition-colors">实用工具</a>
      <a href="index.html#games" class="hover:text-gold transition-colors">小游戏</a>
    </div>
    <div class="flex items-center gap-4">
      <a href="register.html" class="text-sm hover:text-gold transition-colors">注册</a>
      <a href="login.html" class="bg-gold text-black px-4 py-2 rounded-full text-sm font-medium hover:bg-gold/90 transition-colors glow">
        登录账户
      </a>
    </div>
  </div>
</nav>

<!-- 个人小视频头部 -->
<section class="pt-32 pb-16 px-6 min-h-screen fade-up">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gold mb-4">个人小视频</h1>
      <p class="text-gray-400">记录日常、作业、生活片段，不定期更新</p>
    </div>

    <!-- 视频列表 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
      
      <!-- 视频1 -->
      <div class="bg-card rounded-2xl border border-border p-6 card-hover">
        <div class="relative mb-6">
          <div class="absolute inset-0 bg-gold/10 rounded-2xl blur-xl"></div>
          <video class="w-full rounded-xl relative z-10 border border-border" controls poster="封面1.png">
            <source src="256.mp4" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        </div>
        <h3 class="text-xl font-bold text-gold mb-2">26年3月14日 作业记录(上)</h3>
        <p class="text-gray-300 text-sm mb-4">
          */:'
        </p>
      </div>

      <!-- 视频2（预留） -->
      <div class="bg-card rounded-2xl border border-border p-6 card-hover">
        <div class="relative mb-6">
          <div class="absolute inset-0 bg-gold/10 rounded-2xl blur-xl"></div>
          <div class="w-full h-64 bg-dark rounded-xl flex items-center justify-center border border-border relative z-10">
            <i class="fa-solid fa-video text-gold text-4xl"></i>
          </div>
        </div>
        <h3 class="text-xl font-bold text-gold mb-2">下一个视频</h3>
        <p class="text-gray-300 text-sm mb-4">
          即将更新，敬请期待……
        </p>
      </div>

    </div>

    <!-- 返回首页 -->
    <div class="mt-14 text-center">
      <a href="index.html" class="inline-block bg-gold text-black px-8 py-3 rounded-lg font-medium glow hover:scale-105 transition-all">
        返回首页
      </a>
    </div>
  </div>
</section>

<!-- 底部 -->
<footer class="py-10 text-center text-sm text-gray-500 border-t border-border bg-darker">
  <div class="max-w-6xl mx-auto">
    <div class="flex items-center justify-center gap-2 mb-4">
      <i class="fa-solid fa-atom text-gold text-xl"></i>
      <span class="text-gold font-bold">玉国科技</span>
    </div>
    <p>© 2025 玉国科技 版权所有</p>
  </div>
</footer>

<script>
window.addEventListener('load', () => {
  document.querySelectorAll('.fade-up').forEach(el => el.classList.add('show'))
})
window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar')
  if (window.scrollY > 50) {
    navbar.classList.add('glass','py-3')
    navbar.classList.remove('py-4')
  } else {
    navbar.classList.remove('glass','py-3')
    navbar.classList.add('py-4')
  }
})
</script>

</body>
</html>
