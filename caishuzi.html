<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050505',
                        gold: '#FFD700',
                        card: '#121212',
                        border: '#222222',
                    },
                    animation: {
                        'breath': 'breath 4s ease-in-out infinite',
                    },
                    keyframes: {
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
            .card-hover { transition: all .3s ease; }
            .card-hover:hover { transform: translateY(-4px); border-color: #FFD700; }
        }
    </style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0A; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- 导航栏（和你网站完全一致） -->
    <nav class="fixed top-0 left-0 w-full py-4 px-6 bg-dark/90 backdrop-blur-md border-b border-border z-50">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gold text-shadow">
                <i class="fa-solid fa-atom text-gold text-2xl"></i>玉国科技
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-sm text-gray-400 hover:text-gold transition-colors">返回首页</a>
            </div>
        </div>
    </nav>

    <!-- 猜数字游戏主区域 -->
    <main class="pt-32 pb-20 px-6 min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md bg-card rounded-2xl border border-border p-8 card-hover">
            <div class="w-16 h-16 rounded-full bg-gold/10 flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-magnifying-glass text-gold text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-center mb-3">猜数字</h1>
            <p class="text-gray-400 text-sm text-center mb-8">系统随机生成 1-100 数字，挑战用最少次数猜中答案</p>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-300 mb-2">输入你的猜测</label>
                    <input 
                        type="number" 
                        id="guessInput"
                        min="1"
                        max="100"
                        placeholder="请输入 1-100 之间的数字"
                        class="w-full bg-dark border border-gray-700 rounded-xl px-4 py-3 text-white focus:border-gold focus:outline-none transition-colors"
                    >
                </div>
                
                <button 
                    onclick="handleGuess()"
                    class="w-full bg-gold text-black py-3 rounded-xl font-medium glow hover:bg-gold/90 transition-colors transform hover:scale-[1.02] active:scale-[0.98]"
                >
                    提交答案
                </button>
                
                <div id="resultBox" class="min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center">
                    <p id="resultText" class="text-sm text-gray-300">请开始你的猜测</p>
                </div>
                
                <div class="text-xs text-gray-500 text-center">
                    提示：每次猜测后会告诉你「偏大」或「偏小」
                </div>
            </div>
        </div>
    </main>

    <!-- 底部信息 -->
    <footer class="py-6 text-center text-sm text-gray-500 border-t border-border bg-darker">
        <p>© 2025 玉国科技 | 黑金风格小游戏</p>
    </footer>

    <script>
        // 游戏核心逻辑
        let targetNumber = Math.floor(Math.random() * 100) + 1;
        const input = document.getElementById('guessInput');
        const resultText = document.getElementById('resultText');
        const resultBox = document.getElementById('resultBox');

        function handleGuess() {
            const value = parseInt(input.value);
            
            // 输入验证
            if (isNaN(value)) {
                resultText.textContent = "⚠️ 请输入有效的数字";
                resultBox.className = "min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center border border-red-500/30";
                return;
            }
            if (value < 1 || value > 100) {
                resultText.textContent = "⚠️ 请输入 1-100 之间的数字";
                resultBox.className = "min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center border border-orange-500/30";
                return;
            }

            // 猜测判断
            if (value === targetNumber) {
                resultText.textContent = "🎉 恭喜你！猜对了！游戏已重置";
                resultBox.className = "min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center border border-green-500/30";
                // 重置游戏
                targetNumber = Math.floor(Math.random() * 100) + 1;
                input.value = "";
            } else if (value < targetNumber) {
                resultText.textContent = "⬆️ 猜小了，再试一次";
                resultBox.className = "min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center border border-blue-500/30";
            } else {
                resultText.textContent = "⬇️ 猜大了，再试一次";
                resultBox.className = "min-h-[40px] bg-dark/50 rounded-xl p-3 flex items-center justify-center border border-blue-500/30";
            }
        }

        // 回车提交
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleGuess();
        });
    </script>
</body>
</html>
