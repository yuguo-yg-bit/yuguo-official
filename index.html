<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玉国公司 - 官方网站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#36CFC9',
            dark: '#1D2129',
            light: '#F2F3F5'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1; }
    .nav-link { @apply px-4 py-2 text-gray-600 hover:text-primary transition-colors; }
    .btn-primary { @apply bg-primary text-white px-6 py-2 rounded-lg hover:bg-primary/90 transition-colors; }
  </style>
</head>

<body class="bg-light text-dark">

<header class="fixed w-full bg-white shadow-sm z-50">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">
    <a href="#" class="flex items-center gap-3">
      <img src="https://你的github地址/logo.png" class="h-10 rounded">
      <span class="text-xl font-bold text-primary">玉国公司</span>
    </a>
    <nav class="hidden md:flex gap-1">
      <a href="#home" class="nav-link">首页</a>
      <a href="#about" class="nav-link">公司简介</a>
      <a href="#movies" class="nav-link">电影</a>
      <a href="#products" class="nav-link">商品</a>
      <a href="#mascots" class="nav-link">吉祥物</a>
      <a href="#message" class="nav-link">留言箱</a>
      <a href="#games" class="nav-link">小游戏</a>
    </nav>
  </div>
</header>

<section id="home" class="pt-28 pb-16 bg-gradient-to-br from-primary/5 to-secondary/5">
  <div class="container mx-auto px-4 text-center">
    <h1 class="text-4xl font-bold mb-4">玉国公司官方网站</h1>
    <p class="text-gray-600 max-w-xl mx-auto">文创 · 3D打印 · 趣味周边</p>
  </div>
</section>

<section id="about" class="py-16 bg-white">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-6">公司简介</h2>
    <div class="max-w-xl mx-auto p-6 bg-light rounded-2xl shadow-sm">
      <p>地址：广东省珠海市香洲区</p>
      <p>电话：+86 15913650169</p>
      <p class="mt-2 text-gray-600">专注文创产品、3D打印模型开发</p>
    </div>
  </div>
</section>

<section id="movies" class="py-16 bg-light">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-10">主流电影</h2>
    <div class="max-w-sm mx-auto p-8 bg-white rounded-xl shadow-sm">
      <p class="text-gray-500 text-lg">无</p>
    </div>
  </div>
</section>

<section id="products" class="py-16 bg-white">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-10">商品专区</h2>
    <div class="max-w-sm mx-auto bg-light rounded-xl p-5 shadow-sm card-hover">
      <img src="https://picsum.photos/seed/danzai/400/400" class="w-full h-64 object-cover rounded-xl mb-4">
      <h3 class="text-xl font-bold">3D打印蛋仔</h3>
      <p class="text-gray-600 mb-1">无</p>
      <p class="text-primary text-2xl font-bold my-4">¥3.00</p>
      <button onclick="pay()" class="btn-primary w-full">立即购买</button>
    </div>
  </div>
</section>

<section id="mascots" class="py-16 bg-light">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-10">品牌吉祥物</h2>
    <img src="https://你的github地址/xiaofeifei.png" class="h-60 mx-auto rounded-xl shadow-md">
    <h3 class="mt-4 text-xl font-semibold">兔兔小飞飞</h3>
    <p class="gray-500">玉国公司吉祥物</p>
  </div>
</section>

<section id="message" class="py-16 bg-white">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl font-bold text-center mb-10">留言箱</h2>
    <div class="max-w-md mx-auto p-6 bg-light rounded-2xl shadow-sm">
      <input placeholder="姓名" class="w-full p-3 rounded-lg border mb-3">
      <input placeholder="联系方式" class="w-full p-3 rounded-lg border mb-3">
      <textarea placeholder="留言内容" class="w-full p-3 rounded-lg border h-32 mb-3"></textarea>
      <button class="btn-primary w-full" onclick="alert('提交成功')">提交留言</button>
    </div>
  </div>
</section>

<section id="games" class="py-16 bg-light">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-10">趣味小游戏</h2>
    <div class="max-w-md mx-auto p-6 bg-white rounded-xl shadow-sm">
      <h3 class="font-bold mb-2">猜数字</h3>
      <input type="number" id="guess" class="p-2 rounded border mr-2" placeholder="1-100">
      <button onclick="guess()" class="btn-primary">猜</button>
      <p id="gInfo" class="mt-2 text-gray-600"></p>
    </div>
  </div>
</section>

<footer class="bg-dark text-white py-6 text-center">
  <p>© 2025 玉国公司 版权所有</p>
  <p class="text-gray-400 text-sm">珠海香洲 | +86 15913650169</p>
</footer>

<script>
let ans = Math.floor(Math.random()*100)+1;
function guess(){
  let g = document.getElementById("guess").value;
  let t = document.getElementById("gInfo");
  if(g>ans) t.textContent="大了";
  else if(g<ans) t.textContent="小了";
  else { t.textContent="猜对啦！"; ans = Math.floor(Math.random()*100)+1; }
}

// 真实微信支付（弹出收款码）
function pay(){
  alert("请扫码支付 3 元");
  window.open("https://你的github地址/wechat-pay.png", "_blank");
}
</script>
</body>
</html>
