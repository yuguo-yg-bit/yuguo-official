<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#4080FF',
                        light: '#E8F3FF',
                        darkblue: '#0E2F89',
                        panel: '#FFFFFF',
                        bglight: '#F5F8FF'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F5F8FF;
            font-family: system-ui, sans-serif;
        }
        .order-card {
            transition: all 0.2s ease;
        }
        .order-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<!-- 顶部栏 -->
<header class="bg-white shadow-sm px-4 py-3 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-primary text-xl font-bold">
            <i class="bi bi-shield-check mr-1"></i> 玉国科技 - 管理后台
        </h1>
        <button onclick="logout()" class="text-sm text-gray-600 hover:text-primary">
            <i class="bi bi-box-arrow-right mr-1"></i> 退出登录
        </button>
    </div>
</header>

<div class="max-w-6xl mx-auto px-4 py-8">

    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-5 rounded-xl shadow-sm border border-light">
            <p class="text-sm text-gray-500">全部订单</p>
            <p class="text-2xl font-bold text-primary" id="totalOrder">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-sm border border-light">
            <p class="text-sm text-gray-500">待发货 / 运输中</p>
            <p class="text-2xl font-bold text-secondary" id="shippingNum">0</p>
        </div>
        <div class="bg-white p-5 rounded-xl shadow-sm border border-light">
            <p class="text-sm text-gray-500">已完成订单</p>
            <p class="text-2xl font-bold text-darkblue" id="finishNum">0</p>
        </div>
    </div>

    <!-- 订单列表 -->
    <h2 class="text-lg font-bold text-gray-800 mb-4">
        <i class="bi bi-list-ul mr-1"></i> 全部订单管理
    </h2>

    <div id="orderList" class="space-y-4">
        <div class="bg-white p-6 rounded-xl text-center text-gray-500">
            <i class="bi bi-hourglass-split text-2xl"></i>
            <p class="mt-2">正在加载订单...</p>
        </div>
    </div>
</div>

<script>
const GITHUB_CONFIG = {
    username: "yuguo-yg-bit",
    repo: "yuguo-official",
    token: "ghp_sVylTqJv8n"+"vK3SK3wS2qidM6AvQAFx1rAvCd"
};

// 简单管理员验证（你可以自己改密码）
const adminPassword = "admin123";

if (!localStorage.getItem('isAdmin')) {
    const pwd = prompt("请输入管理员密码：");
    if (pwd !== adminPassword) {
        alert("密码错误");
        window.location.href = "index.html";
    } else {
        localStorage.setItem('isAdmin', 'ok');
    }
}

function logout() {
    localStorage.removeItem('isAdmin');
    window.location.href = "index.html";
}

// 加载所有订单
let allIssues = [];
async function loadAllOrders() {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues?labels=payment-record&state=all`, {
        headers: {
            "Authorization": `token ${GITHUB_CONFIG.token}`,
            "Accept": "application/vnd.github.v3+json"
        }
    });
    const issues = await res.json();
    allIssues = issues;
    renderAdminList(issues);
    statistics(issues);
}

// 统计
function statistics(issues) {
    document.getElementById('totalOrder').innerText = issues.length;
    let shipping = 0, finish = 0;
    issues.forEach(iss => {
        const p = getProgress(iss.body);
        if (p >= 1 && p < 7) shipping++;
        if (p >= 7) finish++;
    });
    document.getElementById('shippingNum').innerText = shipping;
    document.getElementById('finishNum').innerText = finish;
}

// 解析物流进度
function getProgress(body) {
    const m = body.match(/物流进度：(\d+)/);
    return m ? parseInt(m[1]) : 0;
}

// 渲染列表
function renderAdminList(issues) {
    const box = document.getElementById('orderList');
    if (issues.length === 0) {
        box.innerHTML = `<div class="bg-white p-6 rounded-xl text-center text-gray-500">暂无订单</div>`;
        return;
    }
    let html = '';
    issues.forEach(iss => {
        const b = iss.body;
        const orderNo = b.match(/订单号：(\S+)/)?.[1] || '无';
        const user = b.match(/用户手机号：(.+)/)?.[1] || '无';
        const product = b.match(/商品名称：(.+)/)?.[1] || '无';
        const amount = b.match(/支付金额：(.+)/)?.[1] || '无';
        const name = b.match(/收货人：(.+)/)?.[1] || '无';
        const phone = b.match(/联系电话：(.+)/)?.[1] || '无';
        const addr = b.match(/收货地址：(.+)/)?.[1] || '无';
        const progress = getProgress(b);

        const textList = [
            "订单已提交",
            "待审核",
            "已出库",
            "运输1/5",
            "运输2/5",
            "运输3/5",
            "运输4/5",
            "已签收"
        ];
        const statusText = textList[progress] || "未知";

        html += `
<div class="order-card bg-white p-5 rounded-xl shadow-sm border border-light">
    <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">
        <div class="space-y-2 text-sm">
            <p><span class="text-gray-600 w-24 inline-block">订单号：</span>${orderNo}</p>
            <p><span class="text-gray-600 w-24 inline-block">用户：</span>${user}</p>
            <p><span class="text-gray-600 w-24 inline-block">商品：</span>${product}</p>
            <p><span class="text-gray-600 w-24 inline-block">金额：</span>${amount}</p>
            <p><span class="text-gray-600 w-24 inline-block">收货人：</span>${name} ${phone}</p>
            <p><span class="text-gray-600 w-24 inline-block">地址：</span>${addr}</p>
        </div>
        <div class="space-y-2 min-w-[220px]">
            <p class="text-primary font-medium">当前状态：${statusText}</p>
            <select class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" onchange="updateProgress(this, '${iss.number}', '${orderNo}')">
                <option value="0" ${progress==0?'selected':''}>0 - 订单已提交</option>
                <option value="1" ${progress==1?'selected':''}>1 - 付款成功</option>
                <option value="2" ${progress==2?'selected':''}>2 - 审核通过</option>
                <option value="3" ${progress==3?'selected':''}>3 - 运输1/5</option>
                <option value="4" ${progress==4?'selected':''}>4 - 运输2/5</option>
                <option value="5" ${progress==5?'selected':''}>5 - 运输3/5</option>
                <option value="6" ${progress==6?'selected':''}>6 - 运输4/5</option>
                <option value="7" ${progress==7?'selected':''}>7 - 已签收</option>
            </select>
        </div>
    </div>
</div>
        `;
    });
    box.innerHTML = html;
}

// 修改物流进度
async function updateProgress(sel, issueNum, orderNo) {
    const newProgress = sel.value;
    const issue = allIssues.find(i => i.number == issueNum);
    if (!issue) return;

    let body = issue.body;
    // 替换物流进度
    body = body.replace(/物流进度：\d+/, `物流进度：${newProgress}`);
    // 替换状态文字
    const textList = [
        "订单已提交","付款成功，待审核","审核通过，已出库",
        "运输中（1/5）","运输中（2/5）","运输中（3/5）",
        "运输中（4/5）","已签收，交易完成"
    ];
    body = body.replace(/物流状态：.+/, `物流状态：${textList[newProgress]}`);

    try {
        await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues/${issueNum}`, {
            method: "PATCH",
            headers: {
                "Authorization": `token ${GITHUB_CONFIG.token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ body })
        });
        alert("订单状态已更新！");
        loadAllOrders();
    } catch(e) {
        alert("更新失败：" + e.message);
    }
}

window.onload = () => {
    loadAllOrders();
};
</script>

</body>
</html>
