<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 玉国科技</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            secondary: '#4080FF',
            danger: '#F53F3F',
            success: '#00B42A',
            light: '#E8F3FF',
            bglight: '#F5F8FF'
          }
        }
      }
    }
  </script>
  <style>
    body { background: #F5F8FF;font-family:sans-serif; }
    .tab-active { border-bottom:2px solid #165DFF;color:#165DFF;font-weight:600; }
  </style>
</head>
<body>

<header class="bg-white shadow-sm px-4 py-3 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-primary text-xl font-bold">
      <i class="bi bi-shield-check mr-1"></i> 玉国科技 - 管理后台
    </h1>
    <button onclick="logout()" class="text-gray-600 hover:text-primary">
      <i class="bi bi-box-arrow-right mr-1"></i>退出登录
    </button>
  </div>
</header>

<div class="max-w-6xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <p class="text-sm text-gray-500">全部订单</p>
      <p class="text-2xl font-bold text-primary" id="totalOrder">0</p>
    </div>
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <p class="text-sm text-gray-500">待发货/运输中</p>
      <p class="text-2xl font-bold text-secondary" id="shippingNum">0</p>
    </div>
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <p class="text-sm text-gray-500">已完成</p>
      <p class="text-2xl font-bold text-success" id="finishNum">0</p>
    </div>
    <div class="bg-white p-5 rounded-xl shadow-sm border">
      <p class="text-sm text-gray-500">注册用户</p>
      <p class="text-2xl font-bold text-success" id="userCount">0</p>
    </div>
  </div>

  <div class="flex gap-6 mb-4 border-b pb-2">
    <div id="tab_order" class="tab-active cursor-pointer" onclick="switchTab('order')">订单管理</div>
    <div id="tab_user" class="cursor-pointer text-gray-500" onclick="switchTab('user')">用户管理</div>
  </div>

  <div id="panel_order">
    <div class="flex justify-between items-center mb-3">
      <div class="flex items-center gap-3">
        <input type="checkbox" id="checkAll" class="w-4 h-4">
        <label for="checkAll">全选</label>
        <button onclick="batchDelete()" class="bg-danger text-white px-3 py-1 rounded text-sm">
          批量彻底删除
        </button>
      </div>
      <button onclick="loadOrders()" class="bg-primary text-white px-3 py-1 rounded text-sm">刷新订单</button>
    </div>
    <div id="orderList" class="space-y-3"></div>
  </div>

  <div id="panel_user" class="hidden">
    <div class="flex justify-end mb-3">
      <button onclick="loadUsers()" class="bg-primary text-white px-3 py-1 rounded text-sm">刷新用户</button>
    </div>
    <div id="userList" class="space-y-3"></div>
  </div>
</div>

<script>
// ================== 配置 ==================
const CONFIG = {
  owner: 'yuguo-yg-bit',
  repo: 'yuguo-official',
  t1: 'ghp_sVylTqJv8nv',
  t2: 'K3SK3wS2qidM6AvQ',
  t3: 'AFx1rAvCd',
  get token() { return this.t1 + this.t2 + this.t3 },
  adminPwd: '0978004710_27015150111_admin'
};

let orders = [];
let users = [];
let currentTab = 'order';

// 登录验证
if (!localStorage.getItem('isAdmin')) {
  const p = prompt('请输入管理员密码：');
  if (p !== CONFIG.adminPwd) {
    alert('密码错误');
    location.href = '/index.html';
  } else {
    localStorage.setItem('isAdmin', '1');
  }
}

function logout() {
  localStorage.removeItem('isAdmin');
  location.href = '/index.html';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panel_order').classList.add('hidden');
  document.getElementById('panel_user').classList.add('hidden');
  document.getElementById('tab_order').classList.remove('tab-active');
  document.getElementById('tab_user').classList.remove('tab-active');
  document.getElementById('tab_' + tab).classList.add('tab-active');
  document.getElementById('panel_' + tab).classList.remove('hidden');
  tab === 'order' ? loadOrders() : loadUsers();
}

// ================== 订单 ==================
async function loadOrders() {
  const el = document.getElementById('orderList');
  el.innerHTML = '<div class="bg-white p-4 text-center">加载中...</div>';
  try {
    const r = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues?labels=payment-record&state=all&per_page=100`, {
      headers: { Authorization: `token ${CONFIG.token}` }
    });
    orders = await r.json();
    renderOrders();
    updateStats();
  } catch (e) {
    el.innerHTML = '<div class="bg-white p-4 text-center text-red-500">加载失败</div>';
  }
}

function updateStats() {
  document.getElementById('totalOrder').innerText = orders.length;
  let s = 0, f = 0;
  orders.forEach(o => {
    const m = o.body.match(/物流进度：(\d+)/);
    const p = m ? +m[1] : 0;
    if (p >= 1 && p < 7) s++;
    if (p >= 7) f++;
  });
  document.getElementById('shippingNum').innerText = s;
  document.getElementById('finishNum').innerText = f;
}

function renderOrders() {
  const list = document.getElementById('orderList');
  if (orders.length === 0) {
    list.innerHTML = '<div class="bg-white p-4 text-center">暂无订单</div>';
    return;
  }
  const status = ['已提交','待审核','已出库','运输1/5','运输2/5','运输3/5','运输4/5','已签收'];
  let html = '';
  orders.forEach(o => {
    const b = o.body;
    const no = b.match(/订单号：(\S+)/)?.[1] || '';
    const user = b.match(/用户手机号：(.+)/)?.[1] || '';
    const goods = b.match(/商品名称：(.+)/)?.[1] || '';
    const money = b.match(/支付金额：(.+)/)?.[1] || '';
    const name = b.match(/收货人：(.+)/)?.[1] || '';
    const phone = b.match(/联系电话：(.+)/)?.[1] || '';
    const addr = b.match(/收货地址：(.+)/)?.[1] || '';
    const p = b.match(/物流进度：(\d+)/) ? +b.match(/物流进度：(\d+)/)[1] : 0;

    html += `
<div class="bg-white p-4 rounded-xl shadow-sm border">
  <div class="flex items-start gap-2 mb-2">
    <input type="checkbox" class="order-check w-4 h-4 mt-1" data-node="${o.node_id}">
    <div class="flex-1 text-sm">
      <p>订单：${no} · 用户：${user}</p>
      <p>商品：${goods} · ${money}</p>
      <p>收货人：${name} ${phone}</p>
      <p>地址：${addr}</p>
      <p class="text-blue-600">状态：${status[p]}</p>
    </div>
  </div>
  <div class="flex gap-2 border-t pt-2">
    <select class="border rounded px-2 py-1 text-sm" onchange="updatePro('${o.node_id}',this.value)">
      <option value="0" ${p==0?'selected':''}>0-已提交</option>
      <option value="1" ${p==1?'selected':''}>1-待审核</option>
      <option value="2" ${p==2?'selected':''}>2-已出库</option>
      <option value="3" ${p==3?'selected':''}>3-运输1/5</option>
      <option value="4" ${p==4?'selected':''}>4-运输2/5</option>
      <option value="5" ${p==5?'selected':''}>5-运输3/5</option>
      <option value="6" ${p==6?'selected':''}>6-运输4/5</option>
      <option value="7" ${p==7?'selected':''}>7-已签收</option>
    </select>
    <button onclick="delOne('${o.node_id}')" class="bg-red-500 text-white px-2 py-1 rounded text-sm">彻底删除</button>
  </div>
</div>`;
  });
  list.innerHTML = html;
  document.getElementById('checkAll').onchange = e => {
    document.querySelectorAll('.order-check').forEach(c => c.checked = e.target.checked);
  };
}

// 更新进度
async function updatePro(nodeId, val) {
  const o = orders.find(x => x.node_id === nodeId);
  if (!o) return;
  const status = ['已提交','待审核','已出库','运输1/5','运输2/5','运输3/5','运输4/5','已签收'];
  const orderSt = ['待发货','待发货','待发货','待发货','待发货','待发货','待发货','已完成'];
  let body = o.body;
  body = body.replace(/物流进度：\d+/, `物流进度：${val}`);
  body = body.replace(/物流状态：.*/, `物流状态：${status[val]}`);
  body = body.replace(/订单状态：.*/, `订单状态：${orderSt[val]}`);
  await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${o.number}`, {
    method: 'PATCH',
    headers: { Authorization: `token ${CONFIG.token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ body })
  });
  loadOrders();
}

// ================== 核心：真正彻底删除 ==================
async function deleteNode(nodeId) {
  await fetch('https://api.github.com/graphql', {
    method: 'POST',
    headers: { Authorization: `Bearer ${CONFIG.token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      query: `mutation { deleteIssue(input: { issueId: "${nodeId}" }) { clientMutationId } }`
    })
  });
}

// 单条删除
async function delOne(nodeId) {
  if (!confirm('确定要永久彻底删除？不可恢复！')) return;
  await deleteNode(nodeId);
  loadOrders();
}

// 批量删除
async function batchDelete() {
  const nodes = [...document.querySelectorAll('.order-check:checked')].map(c => c.dataset.node);
  if (nodes.length === 0) return alert('请选择订单');
  if (!confirm(`确定彻底删除 ${nodes.length} 条订单？`)) return;
  for (const id of nodes) await deleteNode(id);
  loadOrders();
}

// ================== 用户 ==================
async function loadUsers() {
  const el = document.getElementById('userList');
  el.innerHTML = '<div class="bg-white p-4 text-center">加载中...</div>';
  try {
    const r = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues?labels=user&state=all&per_page=100`, {
      headers: { Authorization: `token ${CONFIG.token}` }
    });
    users = await r.json();
    renderUsers();
    document.getElementById('userCount').innerText = users.length;
  } catch (e) {
    el.innerHTML = '<div class="bg-white p-4 text-center text-red-500">加载失败</div>';
  }
}

function renderUsers() {
  const list = document.getElementById('userList');
  if (users.length === 0) {
    list.innerHTML = '<div class="bg-white p-4 text-center">暂无用户</div>';
    return;
  }
  let html = '';
  users.forEach(u => {
    const b = u.body;
    const phone = b.match(/手机号：(\S+)/)?.[1] || '';
    const pwd = b.match(/密码：(\S+)/)?.[1] || '';
    const time = b.match(/注册时间：(.+)/)?.[1] || '';
    html += `
<div class="bg-white p-4 rounded-xl shadow-sm border text-sm">
  <p>手机号：${phone}</p>
  <p>密码：${pwd}</p>
  <p>注册：${time}</p>
  <div class="flex gap-2 mt-2">
    <button onclick="delOne('${u.node_id}')" class="bg-red-500 text-white px-2 py-1 rounded">删除用户</button>
  </div>
</div>`;
  });
  list.innerHTML = html;
}

// 初始加载
window.onload = () => loadOrders();
</script>
</body>
</html>
