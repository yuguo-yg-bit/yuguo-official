<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 玉国科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#4080FF',
                        danger: '#F53F3F',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        light: '#E8F3FF',
                        bglight: '#F5F8FF',
                        dark: '#121212',
                        darkpanel: '#1E1E1E'
                    }
                },
                darkMode: 'class'
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #F5F8FF;
            --bg-panel: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
        }
        .dark {
            --bg-body: #121212;
            --bg-panel: #1E1E1E;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --border-color: #374151;
        }
        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
            transition: all 0.3s ease;
        }
        .tab-active {
            border-bottom: 2px solid #165DFF;
            color: #165DFF;
            font-weight: 600;
        }
        .order-card.new-order {
            border-left: 4px solid #FF7D00;
        }
        .order-card.unpaid {
            border-left: 4px solid #F53F3F;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background-color: #00B42A;
        }
        .toast.error {
            background-color: #F53F3F;
        }
        .toast.warning {
            background-color: #FF7D00;
        }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #E5E7EB;
            border-top: 2px solid #165DFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .table-view table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-view th, .table-view td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .table-view th {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .detail-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .detail-content.open {
            max-height: 500px;
        }
    </style>
</head>
<body>

<!-- Toast 提示 -->
<div id="toast" class="toast"></div>

<header class="bg-[var(--bg-panel)] shadow-sm px-4 py-3 sticky top-0 z-10 border-b border-[var(--border-color)]">

        <h1 class="text-primary text-xl font-bold">
            <i class="bi bi-shield-check mr-1"></i> 玉国科技 - 全功能管理后台

            <button id="darkModeBtn" class="text-sm p-2 rounded-full hover:bg-[var(--bg-body)]">

    <!-- 标签切换 -->

<script>
// ================== 核心配置（完全保留你的原有配置） ==================
const CONFIG = {
    owner: 'yuguo-yg-bit',
    repo: 'yuguo-official',
    t1: 'ghp_sVylTqJv8nv',
    t2: 'K3SK3wS2qidM6AvQ',
    t3: 'AFx1rAvCd',
    get token() { return this.t1 + this.t2 + this.t3 },
    adminPwd: '0978004710_27015150111_admin',
    orderLabel: 'payment-record',
    userLabel: 'user-register'
};

// 全局变量
let allOrders = [];
let allUsers = [];
let currentTab = 'order';
let currentView = 'card';
let autoRefreshTimer = null;
const statusTexts = ['已提交','待审核','已出库','运输1/5','运输2/5','运输3/5','运输4/5','已签收'];
const orderStatusTexts = ['待发货','待发货','待发货','待发货','待发货','待发货','待发货','已完成'];

// ================== 登录验证（完全保留） ==================
if (!localStorage.getItem('isAdmin')) {
    const p = prompt('请输入管理员密码：');
    if (p !== CONFIG.adminPwd) {
        alert('密码错误，无访问权限');
        window.location.href = 'index.html';
    } else {
        localStorage.setItem('isAdmin', 'ok');
    }
}

function logout() {
    localStorage.removeItem('isAdmin');
    window.location.href = 'index.html';
}

// ================== 工具函数 ==================
// Toast 提示
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast show ${type}`;
    setTimeout(() => {
        toast.className = 'toast';
    }, 3000);
}

// 日期格式化
function formatDate(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

// 判断是否是今天
function isToday(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate();
}

// 判断是否在近7天
function isLast7Day(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    const diff = today - d;
    return diff <= 7 * 24 * 60 * 60 * 1000;
}

// 判断是否是本月
function isThisMonth(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
}

// 生成订单号
function generateOrderNo() {
    return 'ORD' + Date.now() + Math.floor(Math.random()*1000).toString().padStart(3,'0');
}

// 密码哈希（和前台登录保持一致）
async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// 下载文件
function downloadFile(content, filename) {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

// ================== 标签切换 ==================
function switchTab(tab) {
    currentTab = tab;
    // 重置标签样式
    document.getElementById('tab_order').classList.remove('tab-active');
    document.getElementById('tab_user').classList.remove('tab-active');
    document.getElementById('tab_order').classList.add('text-[var(--text-secondary)]');
    document.getElementById('tab_user').classList.add('text-[var(--text-secondary)]');
    // 隐藏面板
    document.getElementById('panel_order').classList.add('hidden');
    document.getElementById('panel_user').classList.add('hidden');
    // 激活当前标签
    document.getElementById(`tab_${tab}`).classList.add('tab-active');
    document.getElementById(`tab_${tab}`).classList.remove('text-[var(--text-secondary)]');
    // 显示面板
    document.getElementById(`panel_${tab}`).classList.remove('hidden');
    // 加载数据
    if (tab === 'order') loadOrders();
    if (tab === 'user') loadUsers();
}

// 加载订单
async function loadOrders() {
    const el = document.getElementById('orderList');
    el.innerHTML = `<div class="bg-[var(--bg-panel)] p-6 rounded-xl text-center text-[var(--text-secondary)]"><div class="loading-spinner mx-auto"></div><p class="mt-2">正在加载订单...</p></div>`;
    try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues?labels=${CONFIG.orderLabel}&state=all&per_page=100`, {
            headers: { Authorization: `token ${CONFIG.token}` }
        });
        allOrders = await res.json();
        renderOrders(allOrders);
        updateOrderStats(allOrders);
        document.getElementById('checkAll').checked = false;
    } catch (e) {
        el.innerHTML = `<div class="bg-[var(--bg-panel)] p-6 rounded-xl text-center text-danger">加载失败：${e.message}</div>`;
        showToast('订单加载失败', 'error');
    }
}

// 更新订单统计
function updateOrderStats(orders) {
    const total = orders.length;
    let today = 0, pending = 0, unpaid = 0, finish = 0, totalAmount = 0;

    orders.forEach(o => {
        const body = o.body;
        // 今日订单
        if (isToday(o.created_at)) today++;
        // 物流进度
        const p = body.match(/物流进度：(\d+)/) ? +body.match(/物流进度：(\d+)/)[1] : 0;
        if (p >= 1 && p < 7) pending++;
        if (p >= 7) finish++;
        // 未支付
        const payStatus = body.match(/支付状态：(\S+)/)?.[1] || '已支付';
        if (payStatus === '未支付') unpaid++;
        // 总金额
        const amount = body.match(/支付金额：¥?(\d+\.?\d*)/)?.[1];
        if (amount) totalAmount += parseFloat(amount);
    });

    // 更新DOM
    document.getElementById('totalOrder').innerText = total;
    document.getElementById('todayOrder').innerText = today;
    document.getElementById('pendingOrder').innerText = pending;
    document.getElementById('unpaidOrder').innerText = unpaid;
    document.getElementById('finishOrder').innerText = finish;
    document.getElementById('totalAmount').innerText = `¥${totalAmount.toFixed(2)}`;

    // 待处理红点
    const badge = document.getElementById('pendingBadge');
    if (pending > 0) {
        badge.innerText = pending;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
}

// 解析订单信息
function parseOrderBody(body) {
    return {
        orderNo: body.match(/订单号：(\S+)/)?.[1] || '',
        userPhone: body.match(/用户手机号：(.+)/)?.[1] || '',
        product: body.match(/商品名称：(.+)/)?.[1] || '',
        amount: body.match(/支付金额：(.+)/)?.[1] || '',
        receiver: body.match(/收货人：(.+)/)?.[1] || '',
        receiverPhone: body.match(/联系电话：(.+)/)?.[1] || '',
        address: body.match(/收货地址：(.+)/)?.[1] || '',
        payTime: body.match(/支付时间：(.+)/)?.[1] || '',
        progress: body.match(/物流进度：(\d+)/) ? +body.match(/物流进度：(\d+)/)[1] : 0,
        payStatus: body.match(/支付状态：(\S+)/)?.[1] || '已支付',
        remark: body.match(/内部备注：(.+)/)?.[1] || ''
    };
}

// 搜索与筛选
document.getElementById('orderSearch').oninput = filterOrders;
document.getElementById('statusFilter').onchange = filterOrders;
document.getElementById('payFilter').onchange = filterOrders;
document.getElementById('timeFilter').onchange = filterOrders;

function filterOrders() {
    const keyword = document.getElementById('orderSearch').value.trim().toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;
    const payFilter = document.getElementById('payFilter').value;
    const timeFilter = document.getElementById('timeFilter').value;

    const filtered = allOrders.filter(o => {
        const info = parseOrderBody(o.body);
        // 关键词搜索
        const matchKeyword = !keyword || 
            info.orderNo.toLowerCase().includes(keyword) ||
            info.userPhone.toLowerCase().includes(keyword) ||
            info.product.toLowerCase().includes(keyword) ||
            info.receiver.toLowerCase().includes(keyword);
        // 状态筛选
        const matchStatus = !statusFilter || info.progress == statusFilter;
        // 支付筛选
        const matchPay = !payFilter || info.payStatus === payFilter;
        // 时间筛选
        let matchTime = true;
        if (timeFilter === 'today') matchTime = isToday(o.created_at);
        if (timeFilter === '7day') matchTime = isLast7Day(o.created_at);
        if (timeFilter === 'month') matchTime = isThisMonth(o.created_at);

        return matchKeyword && matchStatus && matchPay && matchTime;
    });

    renderOrders(filtered);
}

// 复制收货地址
function copyAddress(receiver, phone, address) {
    const text = `${receiver} ${phone} ${address}`;
    navigator.clipboard.writeText(text).then(() => {
        showToast('地址已复制', 'success');
    }).catch(() => {
        showToast('复制失败', 'error');
    });
}

// 更新物流进度
async function updateProgress(nodeId, val) {
    const o = allOrders.find(x => x.node_id === nodeId);
    if (!o) return;

    let body = o.body;
    body = body.replace(/物流进度：\d+/, `物流进度：${val}`);
    body = body.replace(/物流状态：.*/, `物流状态：${statusTexts[val]}`);
    body = body.replace(/订单状态：.*/, `订单状态：${orderStatusTexts[val]}`);

    try {
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${o.number}`, {
            method: 'PATCH',
            headers: {
                Authorization: `token ${CONFIG.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ body })
        });
        showToast('物流状态更新成功', 'success');
        loadOrders();
    } catch (e) {
        showToast('更新失败', 'error');
    }
}

// 批量更新状态
async function batchUpdateStatus() {
    const selected = Array.from(document.querySelectorAll('.order-check:checked'));
    const targetStatus = document.getElementById('batchStatus').value;
    if (selected.length === 0) return showToast('请先选择订单', 'warning');
    if (!targetStatus) return showToast('请选择要修改的状态', 'warning');
    if (!confirm(`确定要将选中的 ${selected.length} 条订单状态改为 ${statusTexts[targetStatus]}？`)) return;

    let success = 0;
    for (const item of selected) {
        const nodeId = item.dataset.node;
        const o = allOrders.find(x => x.node_id === nodeId);
        if (!o) continue;

        let body = o.body;
        body = body.replace(/物流进度：\d+/, `物流进度：${targetStatus}`);
        body = body.replace(/物流状态：.*/, `物流状态：${statusTexts[targetStatus]}`);
        body = body.replace(/订单状态：.*/, `订单状态：${orderStatusTexts[targetStatus]}`);

        try {
            await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${o.number}`, {
                method: 'PATCH',
                headers: {
                    Authorization: `token ${CONFIG.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ body })
            });
            success++;
        } catch (e) {}
    }

    showToast(`批量更新完成：成功 ${success} 条`, 'success');
    loadOrders();
}

async function saveOrderEdit() {
    const o = allOrders.find(x => x.node_id === currentEditOrderNode);
    if (!o) return;

    // 获取表单值
    const orderNo = document.getElementById('editOrderNo').value.trim();
    const userPhone = document.getElementById('editOrderPhone').value.trim();
    const product = document.getElementById('editOrderGoods').value.trim();
    const amount = document.getElementById('editOrderAmount').value.trim();
    const receiver = document.getElementById('editOrderReceiver').value.trim();
    const receiverPhone = document.getElementById('editOrderReceiverPhone').value.trim();
    const address = document.getElementById('editOrderAddress').value.trim();
    const payStatus = document.getElementById('editOrderPayStatus').value;
    const progress = document.getElementById('editOrderProgress').value;
    const remark = document.getElementById('editOrderRemark').value.trim();

    // 构建新的body
    let body = o.body;
    body = body.replace(/订单号：\S+/, `订单号：${orderNo}`);
    body = body.replace(/用户手机号：.+/, `用户手机号：${userPhone}`);
    body = body.replace(/商品名称：.+/, `商品名称：${product}`);
    body = body.replace(/支付金额：.+/, `支付金额：${amount}`);
    body = body.replace(/收货人：.+/, `收货人：${receiver}`);
    body = body.replace(/联系电话：.+/, `联系电话：${receiverPhone}`);
    body = body.replace(/收货地址：.+/, `收货地址：${address}`);
    body = body.replace(/支付状态：\S+/, `支付状态：${payStatus}`);
    body = body.replace(/物流进度：\d+/, `物流进度：${progress}`);
    body = body.replace(/物流状态：.+/, `物流状态：${statusTexts[progress]}`);
    body = body.replace(/订单状态：.+/, `订单状态：${orderStatusTexts[progress]}`);

    // 处理备注
    if (body.match(/内部备注：.+/)) {
        body = body.replace(/内部备注：.+/, `内部备注：${remark}`);
    } else if (remark) {
        body += `\n内部备注：${remark}`;
    }

    try {
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${o.number}`, {
            method: 'PATCH',
            headers: {
                Authorization: `token ${CONFIG.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ body, title: `订单 | ${orderNo}` })
        });
        showToast('订单修改成功', 'success');
        closeOrderModal();
        loadOrders();
    } catch (e) {
        showToast('修改失败', 'error');
    }
}

// 手动创建订单
function openCreateOrderModal() {
    document.getElementById('createOrderNo').value = generateOrderNo();
    document.getElementById('createOrderForm').reset();
    document.getElementById('createOrderNo').value = generateOrderNo();
    document.getElementById('createOrderModal').style.display = 'grid';
}

function closeCreateOrderModal() {
    document.getElementById('createOrderModal').style.display = 'none';
}

async function createOrder() {
    const orderNo = document.getElementById('createOrderNo').value.trim();
    const userPhone = document.getElementById('createOrderPhone').value.trim();
    const product = document.getElementById('createOrderGoods').value.trim();
    const amount = document.getElementById('createOrderAmount').value.trim();
    const receiver = document.getElementById('createOrderReceiver').value.trim();
    const receiverPhone = document.getElementById('createOrderReceiverPhone').value.trim();
    const address = document.getElementById('createOrderAddress').value.trim();
    const payStatus = document.getElementById('createOrderPayStatus').value;

    if (!orderNo || !userPhone || !product || !amount || !receiver || !receiverPhone || !address) {
        return showToast('请填写完整订单信息', 'warning');
    }

    const now = new Date();
    const payTime = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

    // 构建body
    const body = `订单号：${orderNo}
用户手机号：${userPhone}
商品名称：${product}
支付金额：${amount}
支付状态：${payStatus}
收货人：${receiver}
联系电话：${receiverPhone}
收货地址：${address}
支付时间：${payTime}
订单状态：待发货
物流进度：0
物流状态：已提交`;

    try {
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues`, {
            method: 'POST',
            headers: {
                Authorization: `token ${CONFIG.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: `订单 | ${orderNo}`,
                body: body,
                labels: [CONFIG.orderLabel]
            })
        });
        showToast('订单创建成功', 'success');
        closeCreateOrderModal();
        loadOrders();
    } catch (e) {
        showToast('创建失败', 'error');
    }
}

// 导出订单
function exportOrders() {
    if (allOrders.length === 0) return showToast('暂无订单可导出', 'warning');
    let content = '订单号,用户手机号,商品名称,金额,支付状态,物流状态,收货人,联系电话,地址,下单时间\n';
    allOrders.forEach(o => {
        const info = parseOrderBody(o.body);
        content += `${info.orderNo},${info.userPhone},${info.product},${info.amount},${info.payStatus},${statusTexts[info.progress]},${info.receiver},${info.receiverPhone},${info.address},${info.payTime}\n`;
    });
    downloadFile(content, `订单列表_${new Date().toLocaleDateString()}.csv`);
    showToast('订单导出成功', 'success');
}

// ================== 彻底删除（GraphQL 真删除） ==================
async function deleteNode(nodeId) {
    try {
        const res = await fetch('https://api.github.com/graphql', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${CONFIG.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                query: `mutation {
                    deleteIssue(input: { issueId: "${nodeId}" }) {
                        clientMutationId
                    }
                }`
            })
        });
        const json = await res.json();
        return !json.errors;
    } catch (e) {
        console.error(e);
        return false;
    }
}

// 单条删除
async function delOne(nodeId) {
    if (!confirm('确定要永久彻底删除？删除后无法恢复！')) return;
    const success = await deleteNode(nodeId);
    if (success) {
        showToast('删除成功', 'success');
        currentTab === 'order' ? loadOrders() : loadUsers();
    } else {
        showToast('删除失败', 'error');
    }
}

// 批量删除订单
async function batchDelete() {
    const list = Array.from(document.querySelectorAll('.order-check:checked'));
    if (list.length === 0) return showToast('请先选择订单', 'warning');
    if (!confirm(`确定永久删除 ${list.length} 条订单？`)) return;

    let count = 0;
    for (const item of list) {
        const ok = await deleteNode(item.dataset.node);
        if (ok) count++;
    }
    showToast(`成功删除 ${count} 条`, 'success');
    loadOrders();
}

// 清空测试数据
async function clearTestData() {
    if (!confirm('确定清空所有订单与用户？不可恢复！')) return;
    let count = 0;
    for (const o of allOrders) {
        if (await deleteNode(o.node_id)) count++;
    }
    for (const u of allUsers) {
        if (await deleteNode(u.node_id)) count++;
    }
    showToast(`清空完成，共删除 ${count} 条数据`, 'success');
    loadOrders();
    loadUsers();
}

// ================== 用户管理 ==================
async function loadUsers() {
    const el = document.getElementById('userList');
    el.innerHTML = `<div class="bg-[var(--bg-panel)] p-6 text-center"><div class="loading-spinner mx-auto"></div><p class="mt-2">加载用户中...</p></div>`;
    try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues?labels=${CONFIG.userLabel}&state=all&per_page=100`, {
            headers: { Authorization: `token ${CONFIG.token}` }
        });
        allUsers = await res.json();
        renderUsers(allUsers);
        updateUserStats(allUsers);
    } catch (e) {
        el.innerHTML = `<div class="bg-[var(--bg-panel)] p-6 text-center text-danger">加载失败</div>`;
        showToast('用户加载失败', 'error');
    }
}

function updateUserStats(users) {
    const total = users.length;
    const today = users.filter(u => isToday(u.created_at)).length;
    document.getElementById('totalUser').innerText = total;
    document.getElementById('todayUser').innerText = today;
}

function parseUserBody(body) {
    return {
        phone: body.match(/•\s*手机号：(\S+)/)?.[1] || '',
        pwdHash: body.match(/•\s*密码哈希值：(\S+)/)?.[1] || '',
        regTime: body.match(/•\s*注册时间：(.+)/)?.[1] || '',
        status: body.match(/•\s*账号状态：(\S+)/)?.[1] || '正常'
    };
}

function renderUsers(users) {
    const el = document.getElementById('userList');
    if (!users.length) {
        el.innerHTML = `<div class="bg-[var(--bg-panel)] p-6 text-center">暂无用户</div>`;
        return;
    }

    const sort = document.getElementById('userSort').value;
    users.sort((a, b) => sort === 'desc'
        ? new Date(b.created_at) - new Date(a.created_at)
        : new Date(a.created_at) - new Date(b.created_at)
    );

    let html = '';
    users.forEach(u => {
        const info = parseUserBody(u.body);
        const days = Math.floor((new Date() - new Date(u.created_at)) / 86400000);
        html += `
<div class="bg-[var(--bg-panel)] p-4 rounded-xl shadow-sm border">
    <div class="flex justify-between items-start">
        <div>
            <p class="font-bold text-lg">${info.phone}</p>
            <p class="text-sm text-[var(--text-secondary)]">注册：${info.regTime}（${days}天）</p>
            <p class="text-sm">状态：<span class="${info.status==='正常'?'text-success':'text-danger'}">${info.status}</span></p>
        </div>
        <div class="flex flex-col gap-1">
            <button onclick="showUserOrders('${info.phone}')" class="text-xs bg-primary/10 text-primary px-2 py-1 rounded">查看订单</button>
            <button onclick="openResetPwdModal('${u.node_id}')" class="text-xs bg-secondary/10 text-secondary px-2 py-1 rounded">重置密码</button>
            <button onclick="delOne('${u.node_id}')" class="text-xs bg-danger text-white px-2 py-1 rounded">删除</button>
        </div>
    </div>
    <div class="text-xs text-[var(--text-secondary)] mt-2 break-all">
        哈希：${info.pwdHash}
    </div>
</div>`;
    });
    el.innerHTML = html;
}

function filterUsers() {
    const kw = document.getElementById('userSearch').value.trim();
    const filtered = allUsers.filter(u => {
        const info = parseUserBody(u.body);
        return !kw || info.phone.includes(kw);
    });
    renderUsers(filtered);
}

// 查看用户订单
function showUserOrders(phone) {
    const orders = allOrders.filter(o => {
        const info = parseOrderBody(o.body);
        return info.userPhone === phone;
    });
    document.getElementById('userOrderTitle').innerText = `${phone} 的订单（${orders.length}单）`;
    let html = '';
    if (orders.length === 0) {
        html = `<div class="p-4 text-center">暂无订单</div>`;
    } else {
        orders.forEach(o => {
            const info = parseOrderBody(o.body);
            html += `
<div class="p-3 border rounded-lg text-sm">
    <p>订单：${info.orderNo}</p>
    <p>商品：${info.product} · ${info.amount}</p>
    <p>状态：${statusTexts[info.progress]}</p>
</div>`;
        });
    }
    document.getElementById('userOrderList').innerHTML = html;
    document.getElementById('userOrderModal').style.display = 'grid';
}

function closeUserOrderModal() {
    document.getElementById('userOrderModal').style.display = 'none';
}

// 重置密码
function openResetPwdModal(nodeId) {
    currentResetUserId = nodeId;
    document.getElementById('newPwd').value = '';
    document.getElementById('resetPwdModal').style.display = 'grid';
}

function closeResetPwdModal() {
    document.getElementById('resetPwdModal').style.display = 'none';
    currentResetUserId = '';
}

async function confirmResetPwd() {
    const pwd = document.getElementById('newPwd').value.trim();
    if (!pwd) return showToast('请输入新密码', 'warning');
    const hash = await sha256(pwd);
    const u = allUsers.find(x => x.node_id === currentResetUserId);
    if (!u) return;

    let body = u.body;
    body = body.replace(/•\s*密码哈希值：\S+/, `• 密码哈希值：${hash}`);

    try {
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${u.number}`, {
            method: 'PATCH',
            headers: {
                Authorization: `token ${CONFIG.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ body })
        });
        showToast('密码已重置', 'success');
        closeResetPwdModal();
        loadUsers();
    } catch (e) {
        showToast('重置失败', 'error');
    }
}

// 导出用户
function exportUsers() {
    if (allUsers.length === 0) return showToast('暂无用户', 'warning');
    let content = '手机号,密码哈希,注册时间,状态\n';
    allUsers.forEach(u => {
        const info = parseUserBody(u.body);
        content += `${info.phone},${info.pwdHash},${info.regTime},${info.status}\n`;
    });
    downloadFile(content, `用户列表_${new Date().toLocaleDateString()}.csv`);
    showToast('用户导出成功', 'success');
}

// 初始化
window.onload = function () {
    loadOrders();
    if (localStorage.getItem('dark') === '1') {
        document.documentElement.classList.add('dark');
        document.getElementById('darkModeBtn').innerHTML = '<i class="bi bi-sun"></i>';
    }
};
