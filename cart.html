<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 玉国科技</title>
    <script src="https://cdn.tcdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0A0A0A',
                        darker: '#050500',
                        gold: '#FFD700',
                        glass: 'rgba(20,20,20,0.85)',
                        card: '#121212',
                        border: '#222',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'breath': 'breath 4s ease-in-out infinite',
                        'marquee': 'slide 12s linear infinite',
                    },
                    keyframes: {
                        breath: {
                            '0%,100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' }
                        },
                        slide: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(-100%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
        }
    </style>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }
        body { background:#0A0A0A; color:#FFD700; font-family:system-ui,sans-serif; overflow-x:hidden; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width:8px; }
        ::-webkit-scrollbar-track { background:#0A0A0A; }
        ::-webkit-scrollbar-thumb { background:#FFD700; border-radius:4px; }
    </style>
</head>
<body>

<script>
const GITHUB_CONFIG = {
    username: "yuguo-yg-bit",
    repo: "yuguo-official",
    token: "ghp_sVylTqJv8nvK3S"+"K3wS2qidM6AvQAFx1rAvCd"
};

const currentUser = JSON.parse(localStorage.getItem('currentUser') || null);
if (!currentUser) {
    alert("请先登录");
    location.href = "login.html";
}

let cartList = [];
let totalPrice = 0;
let refreshTimer; // 自动刷新定时器

// 导航用户状态
function checkLoginNav() {
    document.getElementById("userArea").innerHTML = `
    <span class="text-gold mr-3">${currentUser.phone}</span>
    <a href="index.html" class="text-sm text-gold hover:text-white">首页</a>
    <button onclick="logout()" class="text-sm text-gold hover:text-white">退出</button>`;
}

function logout() {
    localStorage.removeItem("currentUser");
    location.href = "login.html";
}

// 核心：加载购物车
async function loadCart() {
    const listEl = document.getElementById("cartList");
    const emptyEl = document.getElementById("emptyCart");
    const checkoutBox = document.getElementById("checkoutBox");

    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues?labels=cart&state=all`, {
            headers: { Authorization: `token ${GITHUB_CONFIG.token}` }
        });
        const all = await res.json();
        cartList = all.filter(i => i.body?.includes(currentUser.phone));

        if (cartList.length === 0) {
            listEl.classList.add("hidden");
            emptyEl.classList.remove("hidden");
            checkoutBox.classList.add("hidden");
            return;
        }

        let html = "";
        totalPrice = 0;

        cartList.forEach(item => {
            const nameMatch = item.body?.match(/商品：(.+)/);
            const priceMatch = item.body?.match(/单价：(.+)/);
            const name = nameMatch ? nameMatch[1].trim() : "未知商品";
            const price = priceMatch ? priceMatch[1].trim() : "¥0.00";
            const num = parseFloat(price.replace("¥", "")) || 0;
            totalPrice += num;

            html += `
            <div class="bg-card rounded-xl border border-border p-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-box text-gold text-xl"></i>
                    <div>
                        <div class="font-bold text-gold">${name}</div>
                        <div class="text-gold/80">${price}</div>
                    </div>
                </div>
                <button onclick="delCart(${item.number})" 
                    class="bg-red-500 text-white px-3 py-1 rounded text-sm">
                    <i class="fa-solid fa-trash mr-1"></i>删除
                </button>
            </div>`;
        });

        listEl.innerHTML = html;
        document.getElementById("totalPrice").innerText = "¥" + totalPrice.toFixed(2);
        listEl.classList.remove("hidden");
        emptyEl.classList.add("hidden");
        checkoutBox.classList.remove("hidden");
    } catch (e) {
        console.error("刷新失败", e);
    }
}

// 删除商品
async function delCart(id) {
    if (!confirm("确定删除？")) return;
    await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues/${id}`, {
        method: "PATCH",
        headers: { Authorization: `token ${GITHUB_CONFIG.token}` },
        body: JSON.stringify({ state: "closed" })
    });
    loadCart();
}

// 打开支付
function goToPay() {
    document.getElementById("showTotal").innerText = "¥" + totalPrice.toFixed(2);
    document.getElementById("payLayer").classList.remove("hidden");
}

// 关闭支付
function closePay() {
    document.getElementById("payLayer").classList.add("hidden");
}

// 确认支付
async function confirmPay() {
    if (!confirm("确认已支付？")) return;

    const orderNo = "YG" + Date.now();
    const payTime = new Date().toLocaleString("zh-CN");

    for (const item of cartList) {
        const nameMatch = item.body?.match(/商品：(.+)/);
        const priceMatch = item.body?.match(/单价：(.+)/);
        const name = nameMatch ? nameMatch[1].trim() : "未知商品";
        const price = priceMatch ? priceMatch[1].trim() : "¥0.00";

        const newBody = `用户：${currentUser.phone}\n商品：${name}\n单价：${price}\n订单号：${orderNo}\n支付时间：${payTime}\n状态：已支付`;

        await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues/${item.number}`, {
            method: "PATCH",
            headers: { Authorization: `token ${GITHUB_CONFIG.token}` },
            body: JSON.stringify({
                labels: ["payment-record"],
                body: newBody
            })
        });
    }

    alert("支付成功！订单已生成");
    closePay();
    loadCart();
}

// ========== 关键：自动实时刷新 ==========
function autoRefreshCart() {
    loadCart(); // 立即刷一次
    clearInterval(refreshTimer);
    // 每 2 秒自动刷新一次购物车
    refreshTimer = setInterval(loadCart, 2000);
}
</script>

<!-- 顶部 -->
<div class="fixed top-0 left-0 w-full z-50">
    <div class="bg-black text-gold py-1 text-sm overflow-hidden">
        <div class="whitespace-nowrap animate-marquee px-4">
            🎉 玉国科技 | 3D打印蛋仔 | 购物车自动刷新
        </div>
    </div>
    <nav class="bg-dark/90 glass py-3 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gold text-shadow">
                <i class="fa-solid fa-atom text-gold text-2xl animate-pulse-slow"></i>玉国科技
            </a>
            <div id="userArea" class="flex items-center gap-4"></div>
        </div>
    </nav>
</div>

<!-- 内容 -->
<section class="pt-[120px] px-6 py-10 min-h-screen">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gold mb-8 flex items-center gap-2">
            <i class="fa-solid fa-shopping-cart"></i> 购物车
        </h1>

        <div id="cartList" class="space-y-4 mb-6 hidden"></div>

        <div id="emptyCart" class="bg-card rounded-xl border border-border p-12 text-center">
            <i class="fa-solid fa-shopping-cart text-gold/50 text-4xl mb-4"></i>
            <h3 class="text-xl font-bold text-gold mb-4">购物车为空</h3>
            <a href="index.html#product" class="bg-gold text-black px-6 py-3 rounded-lg font-bold glow">
                去选购商品
            </a>
        </div>

        <div id="checkoutBox" class="hidden bg-card rounded-xl border border-border p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-gold">
                <span class="text-sm text-gold/70">合计：</span>
                <span id="totalPrice" class="text-2xl font-bold">¥0.00</span>
            </div>
            <button onclick="goToPay()" class="bg-gold text-black px-8 py-3 rounded-lg font-bold glow">
                <i class="fa-solid fa-credit-card mr-1"></i>去支付
            </button>
        </div>
    </div>
</section>

<!-- 支付弹窗 -->
<div id="payLayer" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-dark rounded-2xl border border-gold/40 p-8 max-w-sm w-full text-center relative">
        <button onclick="closePay()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-gold text-black flex items-center justify-center font-bold">✕</button>
        <h3 class="text-2xl font-bold text-gold mb-2">微信支付</h3>
        <p class="text-gold/80 mb-4">请扫码支付</p>
        <img src="wechat.png" class="w-64 h-64 object-contain mx-auto rounded-lg border border-gold/30 mb-6" alt="微信收款码">
        <p id="showTotal" class="text-gold font-bold text-xl mb-6">¥0.00</p>
        <button onclick="confirmPay()" class="w-full bg-gold text-black py-3 rounded-lg font-bold glow">已完成支付</button>
    </div>
</div>

<footer class="py-8 text-center text-sm text-gold/50 border-t border-border bg-darker">
    <p>© 2025 玉国科技 版权所有</p>
</footer>

<script>
window.addEventListener("load", () => {
    checkLoginNav();
    autoRefreshCart(); // 开启自动刷新
});
</script>
</body>

<script>
// ==============================================
// 1. 禁止右键菜单（防右键另存、查看源码）
// ==============================================
document.oncontextmenu = function (e) {
    e.preventDefault();
};

// ==============================================
// 2. 禁止选中复制（可选）
// ==============================================
document.onselectstart = function (e) {
    // 如果你不想禁选，把这整行注释掉即可
    // e.preventDefault();
};

// ==============================================
// 3. 禁止 F12 / Ctrl+Shift+I / Ctrl+U 查看源码
// ==============================================
document.onkeydown = function (e) {
    // F12
    if (e.key === 'F12') {
        e.preventDefault();
    }
    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
    }
    // Ctrl+U 查看网页源代码
    if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
    }
};

// ==============================================
// 4. 反开发者工具（控制台一打开就跳转/清空）
// ==============================================
let devtools = { open: false };
setInterval(() => {
    if (console.profile || console.profile.toString().indexOf('native') < 0) {
        if (!devtools.open) {
            devtools.open = true;
            //打开控制台就跳空白页（防调试）
            location.href = 'about:blank';
        }
    }
}, 500);

// 强力反调试（控制台打开会卡死/无限debug）
(function antiDebug() {
    function block() {
        debugger;
        setTimeout(block, 10);
    }
    try { block(); } catch (e) {}
})();

// ==============================================
// 5. 防控制台输出刷屏（可选）
// ==============================================
// 
console.log = console.warn = console.error = function(){};

// ==============================================
// 6. 防 iframe 嵌套引用（防别人嵌套你的网站）
// ==============================================
if (window.top !== window.self) {
    window.top.location = window.location.href;
}
</script>

</html>
