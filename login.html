    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        tailwind.config = {

                    colors: {

                        darker: '#050505',
                        gold: '#FFD700',
                        glass: 'rgba(20,20,20,0.85)',
                        card: '#121212',

                    },
                    fontFamily: {
                        tech: ['Inter','system-ui','sans-serif']
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'breath': 'breath 4s ease-in-out infinite'
                    },
                    keyframes: {
                        breath: {
                            '0%, 100%': { boxShadow: '0 0 12px rgba(255,215,0,0.3)' },
                            '50%': { boxShadow: '0 0 20px rgba(255,215,0,0.6)' }
                        }
                    }
                }
            }

    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            .glow { box-shadow: 0 0 15px rgba(255,215,0,0.3); animation: breath 4s ease-in-out infinite; }
            .fade-up { opacity:0; transform:translateY(40px); transition:.8s ease; }
            .fade-up.show { opacity:1; transform:translateY(0); }
        }
    </style>
    <style>
        * { scroll-behavior: smooth; margin: 0; padding: 0; box-sizing: border-box; }
        body { background:#0A0A0A; color:#fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body>

<script>
const GITHUB_CONFIG = {
    username: "yuguo-yg-bit",
    repo: "yuguo-official",
    token: "ghp_sVylTqJv8nv"+"K3SK3wS2qidM6AvQAFx1rAvCd"
};

// 密码哈希函数（和注册页一致）
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// 登录提交
async function handleLogin() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    if (!phone || !password) {
        alert('请输入手机号和密码！');
        return;
    }

    const pwdHash = await hashPassword(password);

    try {
        // 获取所有注册用户的Issue
        const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/issues?labels=user-register&state=all`, {
            headers: {
                "Authorization": `token ${GITHUB_CONFIG.token}`,
                "Accept": "application/vnd.github.v3+json"
            }
        });

        if (response.ok) {
            const issues = await response.json();
            // 匹配手机号和密码哈希
            const user = issues.find(issue => {
                const body = issue.body || "";
                const regPhone = body.match(/手机号：(\d+)/)?.[1];
                const regHash = body.match(/密码哈希值：([a-f0-9]+)/)?.[1];
                return regPhone === phone && regHash === pwdHash;
            });

            if (user) {
                // 登录成功，存储当前用户到localStorage
                localStorage.setItem('currentUser', JSON.stringify({ phone }));
                alert('登录成功！');
                window.location.href = 'index.html';
            } else {
                alert('手机号或密码错误！');
            }
        } else {
            const err = await response.json();
            alert('登录失败：' + err.message);
        }
    } catch (e) {
        alert('网络异常：' + e.message);
    }
}
</script>

            </div>

<script>
window.addEventListener('scroll', () => {
  const navbar = document.getElementById('navbar');
  if (window.scrollY > 50) navbar.classList.add('glass');
  else navbar.classList.remove('glass');
});
window.addEventListener('load', () => {
  document.querySelector('.fade-up').classList.add('show');
});
</script>
